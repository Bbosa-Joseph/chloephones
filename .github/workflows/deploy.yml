name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/domains/chloephonecenter.com/public_html
            GIT_SSH_COMMAND="ssh -i ~/.ssh/chloe_rsa" git pull origin main
            mkdir -p application/cache/sessions
            chmod 700 application/cache/sessions
            sed -i "s|\$config\['sess_save_path'\] = NULL;|\$config['sess_save_path'] = APPPATH . 'cache/sessions';|" application/config/config.php
            echo "Deployed successfully!"
